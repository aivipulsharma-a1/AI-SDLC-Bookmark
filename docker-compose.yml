version: "3.9"

services:
  bookmark-manager:
    build: .
    container_name: bookmark-manager
    ports:
      - "5000:5000"
    volumes:
      - bookmark_data:/data
    environment:
      - DATABASE_PATH=/data/bookmarks.db
      # IMPORTANT: Set a strong random SECRET_KEY before deploying to production.
      # Copy .env.example to .env and set values there, then use env_file: .env
      - SECRET_KEY=change-me-in-production
    restart: unless-stopped

volumes:
  bookmark_data:
